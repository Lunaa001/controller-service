services:
  controller:
    build: .
    image: notebookum-controller:v1.0.0
    restart: unless-stopped
    networks:
      notebookum-network:
        aliases:
          - api.universidad.localhost
    environment:
      - CONSUL_URL=http://consul:8500
      - CONSUL_TOKEN=${CONSUL_TOKEN:-}

networks:
  notebookum-network:
    external: true
