# ============================================================================
# NotebookUM - Docker Compose Unificado
# Levanta TODO el ecosistema de microservicios
# ============================================================================

services:

  # ─── INFRAESTRUCTURA ──────────────────────────────────────────────────────

  # Traefik Reverse Proxy + Dashboard
  traefik:
    image: traefik:3.6
    container_name: notebookum-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../NotebookUM/dockers/traefik/config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../NotebookUM/dockers/traefik/config/config.yml:/etc/traefik/config.yml:ro
      - ../NotebookUM/dockers/traefik/certs:/etc/certs:ro
    networks:
      - notebookum-network
    depends_on:
      - consul
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.universidad.localhost`)"
      - "traefik.http.routers.traefik.entryPoints=http"
      - "traefik.http.routers.traefik.service=api@internal"

  # HashiCorp Consul — Service Discovery + KV Store
  consul:
    image: hashicorp/consul:1.20
    container_name: notebookum-consul
    restart: unless-stopped
    volumes:
      - "../NotebookUM/dockers/consul/data:/consul/data"
      - "../NotebookUM/dockers/consul/config:/consul/config"
    command: agent -server -client=0.0.0.0 -bootstrap -ui -data-dir=/consul/data -config-dir=/consul/config -bootstrap-expect=1
    ports:
      - "8500:8500"   # Consul UI
      - "8600:8600/tcp"
      - "8600:8600/udp" # DNS
    networks:
      - notebookum-network

  # PostgreSQL Database (shared)
  postgres:
    image: postgres:16-alpine
    container_name: notebookum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notebookum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notebookum123}
      POSTGRES_DB: ${POSTGRES_DB:-notebookum}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - notebookum-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U notebookum" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── REDIS POR MICROSERVICIO ──────────────────────────────────────────────

  redis-controller:
    image: redis:7-alpine
    container_name: notebookum-redis-controller
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - notebookum-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-user:
    image: redis:7-alpine
    container_name: notebookum-redis-user
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - notebookum-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-extract:
    image: redis:7-alpine
    container_name: notebookum-redis-extract
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - notebookum-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-summary:
    image: redis:7-alpine
    container_name: notebookum-redis-summary
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - notebookum-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-persistence:
    image: redis:7-alpine
    container_name: notebookum-redis-persistence
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - notebookum-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MICROSERVICIOS ───────────────────────────────────────────────────────
  # Nota: Los labels de Traefik fueron eliminados.
  # Cada servicio se registra en Consul al arrancar y Traefik
  # los descubre automáticamente via Consul Catalog Provider.

  # Controller (Go) — Gateway + Orchestrator — Puerto 5000
  controller:
    build:
      context: .
      dockerfile: Dockerfile
    image: notebookum-controller:v1.0.0
    container_name: notebookum-controller
    restart: unless-stopped
    deploy:
      replicas: 1
    networks:
      notebookum-network:
        aliases:
          - api.universidad.localhost
    environment:
      PORT: "5000"
      X_CORRELATION_HEADER: "X-Correlation-ID"
      X_USER_ID_HEADER: "X-User-ID"
      USER_SERVICE_URL: "http://users.universidad.localhost:5000"
      EXTRACT_SERVICE_URL: "http://extractor.universidad.localhost:5000"
      SUMMARY_SERVICE_URL: "http://ai.universidad.localhost:5000"
      PERSISTENCE_URL: "http://persistence-java.universidad.localhost:8080"
      REDIS_URL: "redis://redis-controller:6379"
      REDIS_PASSWORD: ""
      REQUEST_TIMEOUT: "60"
      # Consul Service Discovery
      CONSUL_HOST: "consul"
      CONSUL_PORT: "8500"
    depends_on:
      consul:
        condition: service_started
      redis-controller:
        condition: service_healthy

  # User Service (Python/FastAPI) — Puerto 5000
  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    image: notebookum-user:v1.0.0
    restart: unless-stopped
    deploy:
      replicas: 2
    networks:
      notebookum-network:
        aliases:
          - users.universidad.localhost
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      DEBUG: "False"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-your-super-secret-key-change-in-production}"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRE_MINUTES: "30"
      PERSISTENCE_SERVICE_URL: "http://persistence-java.universidad.localhost:8080"
      REQUEST_TIMEOUT: "30"
      REDIS_HOST: "redis-user"
      REDIS_PORT: "6379"
      LOG_LEVEL: "INFO"
      # Consul Service Discovery
      CONSUL_HOST: "consul"
      CONSUL_PORT: "8500"
    depends_on:
      consul:
        condition: service_started
      redis-user:
        condition: service_healthy
      persistence-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Extract Service (Python/FastAPI) — Puerto 5000
  extract-service:
    build:
      context: ../extract-service
      dockerfile: Dockerfile
    image: notebookum-extractor:v1.0.0
    container_name: notebookum-extract-service
    restart: unless-stopped
    deploy:
      replicas: 1
    networks:
      notebookum-network:
        aliases:
          - extractor.universidad.localhost
    environment:
      REDIS_HOST: "redis-extract"
      REDIS_PORT: "6379"
      # Consul Service Discovery
      CONSUL_HOST: "consul"
      CONSUL_PORT: "8500"
    depends_on:
      consul:
        condition: service_started
      redis-extract:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Summary/AI Service (Python/FastAPI + Groq) — Puerto 5000
  summary-service:
    build:
      context: ../Summary-service
      dockerfile: Dockerfile
    image: notebookum-ai:v1.0.0
    restart: unless-stopped
    deploy:
      replicas: 2
    networks:
      notebookum-network:
        aliases:
          - ai.universidad.localhost
    environment:
      GROQ_API_KEY: "${GROQ_API_KEY}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
      HOST: "0.0.0.0"
      PORT: "5000"
      LOG_LEVEL: "INFO"
      HEALTHCHECK_AI: "false"
      REDIS_HOST: "redis-summary"
      REDIS_PORT: "6379"
      # Consul Service Discovery
      CONSUL_HOST: "consul"
      CONSUL_PORT: "8500"
    depends_on:
      consul:
        condition: service_started
      redis-summary:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Persistence Service (Java/Spring Boot) — Puerto 8080
  persistence-service:
    build:
      context: ../persistence_service
      dockerfile: Dockerfile
    image: notebookum-persistence:v1.0.0
    restart: unless-stopped
    deploy:
      replicas: 2
    networks:
      notebookum-network:
        aliases:
          - persistence-java.universidad.localhost
    environment:
      PORT: "8080"
      DB_WRITE_HOST: "postgres"
      DB_READ_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "${POSTGRES_DB:-notebookum}"
      DB_USER: "${POSTGRES_USER:-notebookum}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-notebookum123}"
      REDIS_HOST: "redis-persistence"
      REDIS_PORT: "6379"
      ALLOWED_ORIGINS: "*"
      DDL_AUTO: "update"
      # Consul Service Discovery
      CONSUL_HOST: "consul"
      CONSUL_PORT: "8500"
    depends_on:
      consul:
        condition: service_started
      postgres:
        condition: service_healthy
      redis-persistence:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# ─── VOLÚMENES ──────────────────────────────────────────────────────────────
volumes:
  postgres-data:

# ─── RED COMPARTIDA ─────────────────────────────────────────────────────────
networks:
  notebookum-network:
    driver: bridge
